name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      # The embedded live demo bundles the built packages, so republish docs
      # when the editor source changes too.
      - 'packages/**'
      - '.github/workflows/deploy-docs.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastUpdated needs full git history

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # pnpm via corepack (bundled with Node) — no marketplace action to fetch.
      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      # The embedded live demo imports the built @useplume/* packages, so the
      # packages must be built before VitePress can resolve them.
      - name: Build packages
        run: pnpm build

      - name: Build docs
        run: pnpm docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
