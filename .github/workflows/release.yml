name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Publishing to npm is intentionally disabled while the project is pre-1.0
      # and unpublished. With only `version` (no `publish`), this action just
      # opens/updates a "Version Packages" PR when changesets exist — it never
      # runs `npm publish`, so a plain merge to main can't accidentally release.
      #
      # To enable publishing later:
      #   1. Add an `NPM_TOKEN` repo secret (npm automation token), or configure
      #      npm trusted publishing (needs npm >= 11.5.1 and a pre-registered
      #      trusted publisher on the package).
      #   2. Restore the build + publish wiring:
      #        with:
      #          publish: pnpm release
      #          version: pnpm version-packages
      #        env:
      #          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      #          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      #      and re-add `permissions: id-token: write` + the registry-url setup.
      - name: Create release PR (publishing disabled)
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
