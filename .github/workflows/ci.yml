name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # pnpm via corepack (bundled with Node) — no marketplace action to fetch.
      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Keeps published packages lean: gzip ceilings + heavy deps stay external.
      - name: Bundle size
        run: pnpm size

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

  bench:
    name: Performance guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # pnpm via corepack (bundled with Node) — no marketplace action to fetch.
      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      # Chromium (+ its system libs) for the Playwright-driven bench harness.
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      # Deterministic invariants (resize coalescing) + generous typing/getHTML
      # ceilings from bench/thresholds.json. Catches order-of-magnitude regressions.
      - name: Performance guard
        run: pnpm bench:check
